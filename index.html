    <meta name="description" content="Word guessing game where players try to guess a hidden word by entering their guesses and receiving feedback on the correctness of their letters and their positions.">

    <body >
    <header>
      <div class="container ">
        <p class="load-hidden">guess the word</p>
<button id="theme-toggle">
    <i class="fa-solid fa-sun"></i>
</button>
      </div>
    </header>

      <div class="guess-game">
        <div class="game-area ">
          <div class="counter"><span class="inputs-container"></span></div>
          <div class="info-about load-hidden">
    <span id="hint-text"> information about them appeared here.</span>
          </div>
          <div class="input load-hidden"></div>
          <div class="control">
            <div class="play">
             <h2 class="load-hidden">play</h2>
            <button id="timer" class="btn load-hidden"><i class="fa-solid fa-hourglass-start"></i> timer</button>
            <button id="no-timer" class="btn load-hidden">no timer</button>
          </div>
           <button class="check">Check Word</button>
            <button class="hint">2 Hints</button>
          </div>
        </div>
        <div class="key-color load-hidden">
          <h2>Key Color</h2>
          <div class="color">
            <div class="in-place key "></div>
            <div class="key-text">letter is right and in place</div>

          </div>
          <div class="color">
            <div class="key not-place"></div>
            <div class="key-text">letter is right but not in place</div>
          </div>
          <div class="color">
            <div class="key co-wrong"></div>
            <div class="key-text">letter is wrong</div>
          </div>
                  <div class="game-info">
          <button class="btn-info">
            How to play<i class="fa-solid fa-info-circle"></i>
          </button>
        </div>
        <div class="game-info">
          <button class="btn-info btn-leader">
           view the leaderboard  <i class="fa-solid fa-crown"></i>
          </button>
        </div>
        <div class="game-info">
          <button class="btn-info btn-add">
           do Yoy want to add your own word? 
          </button>
        </div>
        </div>
      </div>
    </body>
    <footer></footer>
